<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AV Rack Gallery</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(to right, #020617, #0f172a);
    color: white;
    text-align: center;
}

/* Gallery grid */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 15px;
    padding: 20px;
}

.gallery img {
    width: 100%;
    border-radius: 10px;
    transition: transform 0.3s;
}

.gallery img:hover {
    transform: scale(1.05);
}

/* Back button */
.back-btn {
    display: inline-block;
    margin: 20px;
    padding: 10px 20px;
    background: cyan;
    color: black;
    border-radius: 8px;
    font-weight: bold;
}
</style>

</head>

<body>

<h1>AV Rack Projects</h1>

<div class="gallery">
    <img src="./rack1.jpeg">
    <img src="./rack2.jpeg">
    <img src="./rack3.jpeg">
    <img src="./rack4.jpeg">
     <img src="./rack5.jpeg">
     <img src="./rack6.jpeg">
     <img src="./rack7.jpeg">
     <img src="./rack8.jpeg">
     <img src="./rack9.jpeg">
     <img src="./rack10.jpeg">
     <img src="./rack11.jpeg">
     
</div>

<a href="index.html" class="back-btn">⬅ Back to Portfolio</a>

</body>
</html>
