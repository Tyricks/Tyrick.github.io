<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Bible</title>
    <link rel="stylesheet" href="style1.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        :root {
            --primary: #2c3e50;
            --secondary: #4a90ff;
            --accent: #2416aa;
            --light: #f9f9f9;
            --dark: #333;
            --gray: #95a5a6;
        }
        
        body {
            background-color: #2965bf;
            color: var(--dark);
            line-height: 1.6;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: var(--shadow);
            margin-bottom: 25px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        header::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: var(--accent);
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .subtitle {
            font-size: 1.2rem;
            opacity: 0.9;
            max-width: 800px;
            margin: 0 auto;
        }
        
        .nav-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 15px 20px;
            border-radius: 10px;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .nav-buttons {
            display: flex;
            gap: 10px;
        }
        
        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.3s;
            font-weight: 600;
        }
        
        .btn:hover {
            background: #1e4a8a;
        }
        
        .btn-secondary {
            background: var(--secondary);
        }
        
        .btn-secondary:hover {
            background: #557328;
        }
        
        .btn-accent {
            background: var(--accent);
            color: var(--dark);
        }
        
        .btn-accent:hover {
            background: #c19d2c;
        }
        
        .iframe-container {
            background: white;
            border-radius: 10px;
            box-shadow: var(--shadow);
            overflow: hidden;
            margin-bottom: 25px;
        }
        
        iframe {
            width: 100%;
            height: 70vh;
            border: none;
        }
        

        
        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        
        .link-item {
            background: rgba(44, 90, 160, 0.1);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            transition: background 0.3s;
        }
        
        .link-item:hover {
            background: rgba(44, 90, 160, 0.2);
        }
        
        .link-item a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            display: block;
        }
        
        footer {
            text-align: center;
            padding: 25px;
            background: var(--dark);
            color: white;
            border-radius: 10px;
            margin-top: 20px;
        }
        
        .footer-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        
        .footer-links a {
            color: var(--accent);
            text-decoration: none;
        }
        
        @media (max-width: 768px) {
            .nav-controls {
                flex-direction: column;
                align-items: stretch;
            }
            
            .nav-buttons {
                justify-content: center;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .subtitle {
                font-size: 1rem;
            }
        }
        
        .loading {
            text-align: center;
            padding: 20px;
            font-style: italic;
            color: var(--primary);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-bible"></i>Chantimelle SDA Church - Online Bible</h1>
            <p class="subtitle">Powered by Bible Gateway.com - Your online Bible resource with multiple translations, reading plans, devotionals, and study tools</p>
        </header>
        
        <div class="nav-controls">
            <div class="nav-buttons">
                <a href="index.html" class="btn btn-primary">
    <i class="fas fa-external-link-alt"></i> Home
            </a>

                </button>
                
            </div>
            
            
        </div>
        
        <div class="iframe-container">
            
            <iframe 
                src="https://www.biblegateway.com/" 
                id="bibleFrame"
                title="Bible Gateway"
                onload="hideLoading()"
                allowfullscreen>
            </iframe>
        </div>
        
        
        
    <footer>
        <div class="container footer-content">
            
            <p style="margin-top: 15px;">This page embeds Bible Gateway for convenient access. All content copyright © Bible Gateway.</p>
        </footer>
    </div>

    
</body>
</html>
